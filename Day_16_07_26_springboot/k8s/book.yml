apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookapp-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: bookapp

  template:
    metadata:
      labels:
        app: bookapp

    spec:
      containers:
        - name: bookapp
          image: shivranjan17/coforge:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8086

          env:
            - name: MYSQL_HOST
              value: mysql-service

            - name: MYSQL_USER
              value: root

            - name: MYSQL_PASSWORD
              value: root

---
apiVersion: v1
kind: Service
metadata:
  name: bookapp-service

spec:
  type: NodePort

  selector:
    app: bookapp

  ports:
    - port: 8086
      targetPort: 8086
      nodePort: 30086