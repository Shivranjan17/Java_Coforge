spring.application.name=Day_16_07_26_springboot
server.port=8086

spring.jpa.hibernate.ddl-auto=update
#spring.datasource.url=jdbc:mysql://localhost:3306/coforge2db
#spring.datasource.url=jdbc:mysql://host.docker.internal:3306/coforge2db
#spring.datasource.username=root
#spring.datasource.password=

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/bookdb
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true

spring.profiles.active=Prod

management.endpoints.web.exposure.include=*
management.endpoints.web.base-path=/actuator


logging.level.root=INFO
logging.level.com.coforge=DEBUG
logging.file.name=/logs/app.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} -%msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} -%msg%n